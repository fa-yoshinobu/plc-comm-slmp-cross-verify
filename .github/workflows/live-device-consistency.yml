name: Live Device Consistency

on:
  workflow_dispatch:
    inputs:
      plc_ip:
        description: PLC IP address
        required: true
        default: 192.168.250.100
      plc_port:
        description: PLC TCP port
        required: true
        default: "1025"
      profile:
        description: Device consistency profile
        required: true
        default: r120pcpu_tcp1025
      clients:
        description: Comma-separated client list or all
        required: true
        default: all
      devices:
        description: Optional comma-separated device subset
        required: false
        default: ""
      restore_after:
        description: Restore the original value after each write test
        required: true
        type: boolean
        default: true
      summary_only:
        description: Suppress PASS lines and print only failures plus summary
        required: true
        type: boolean
        default: true
      fail_fast:
        description: Stop after the first failure
        required: true
        type: boolean
        default: false
      retries:
        description: Optional retry count override
        required: false
        default: ""

permissions:
  contents: read

jobs:
  live-device-consistency:
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 60

    steps:
      - name: Checkout cross-verify
        uses: actions/checkout@v4

      - name: Checkout Python dependency
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-slmp-python
          path: _deps/plc-comm-slmp-python

      - name: Checkout .NET dependency
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-slmp-dotnet
          path: _deps/plc-comm-slmp-dotnet

      - name: Checkout C++ dependency
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-slmp-cpp-minimal
          path: _deps/plc-comm-slmp-cpp-minimal

      - name: Checkout Node dependency
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/node-red-contrib-plc-comm-slmp
          path: _deps/node-red-contrib-plc-comm-slmp

      - name: Checkout Rust dependency
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-slmp-rust
          path: _deps/plc-comm-slmp-rust

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _deps/node-red-contrib-plc-comm-slmp/package-lock.json

      - name: Install Node dependency packages
        working-directory: _deps/node-red-contrib-plc-comm-slmp
        run: npm ci

      - name: Expose sibling dependency paths
        run: |
          parent="$(dirname "$GITHUB_WORKSPACE")"
          ln -sfn "$GITHUB_WORKSPACE/_deps/plc-comm-slmp-python" "$parent/plc-comm-slmp-python"
          ln -sfn "$GITHUB_WORKSPACE/_deps/plc-comm-slmp-dotnet" "$parent/plc-comm-slmp-dotnet"
          ln -sfn "$GITHUB_WORKSPACE/_deps/plc-comm-slmp-cpp-minimal" "$parent/plc-comm-slmp-cpp-minimal"
          ln -sfn "$GITHUB_WORKSPACE/_deps/node-red-contrib-plc-comm-slmp" "$parent/node-red-contrib-plc-comm-slmp"
          ln -sfn "$GITHUB_WORKSPACE/_deps/plc-comm-slmp-rust" "$parent/plc-comm-slmp-rust"

      - name: Build .NET wrapper
        run: dotnet build clients/dotnet/SlmpVerifyClient/SlmpVerifyClient.csproj -c Debug

      - name: Build C++ wrapper
        run: >
          g++ -std=c++17 -Wall -Wextra
          -I ../plc-comm-slmp-cpp-minimal/src
          clients/cpp/main.cpp
          ../plc-comm-slmp-cpp-minimal/src/slmp_minimal.cpp
          ../plc-comm-slmp-cpp-minimal/src/slmp_high_level.cpp
          -o clients/cpp/cpp_verify_client

      - name: Validate checked-in specs
        run: python validate_specs.py

      - name: Run live device consistency verification
        run: |
          args=(
            python device_command_consistency.py
            --host "${{ inputs.plc_ip }}"
            --port "${{ inputs.plc_port }}"
            --profile "${{ inputs.profile }}"
            --clients "${{ inputs.clients }}"
          )
          if [[ -n "${{ inputs.devices }}" ]]; then
            args+=(--devices "${{ inputs.devices }}")
          fi
          if [[ "${{ inputs.restore_after }}" == "true" ]]; then
            args+=(--restore-after)
          else
            args+=(--no-restore-after)
          fi
          if [[ "${{ inputs.summary_only }}" == "true" ]]; then
            args+=(--summary-only)
          fi
          if [[ "${{ inputs.fail_fast }}" == "true" ]]; then
            args+=(--fail-fast)
          fi
          if [[ -n "${{ inputs.retries }}" ]]; then
            args+=(--retries "${{ inputs.retries }}")
          fi
          "${args[@]}"

      - name: Publish device consistency summary
        if: always()
        run: |
          if [[ -f logs/latest_device_consistency.md ]]; then
            cat logs/latest_device_consistency.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No device consistency markdown report found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload device consistency logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-device-consistency-logs
          path: |
            logs/latest_device_consistency.json
            logs/latest_device_consistency.md
          if-no-files-found: ignore
